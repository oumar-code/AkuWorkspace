components:
  schemas:
    ContextEntry:
      properties:
        key:
          description: Arbitrary context key (e.g. 'last_topic')
          title: Key
          type: string
        value:
          description: JSON-serialisable context value
          title: Value
      required:
      - key
      - value
      title: ContextEntry
      type: object
    ContextRead:
      properties:
        data:
          additionalProperties: true
          title: Data
          type: object
        updated_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Updated At
        user_id:
          title: User Id
          type: string
      required:
      - user_id
      - data
      title: ContextRead
      type: object
    ContextUpdate:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/ContextEntry'
          minItems: 1
          title: Entries
          type: array
      required:
      - entries
      title: ContextUpdate
      type: object
    DocGenerateRequest:
      properties:
        context:
          additionalProperties: true
          description: Additional context forwarded to AkuAI
          title: Context
          type: object
        max_tokens:
          default: 1024
          maximum: 8192.0
          minimum: 64.0
          title: Max Tokens
          type: integer
        prompt:
          description: Natural language prompt
          minLength: 1
          title: Prompt
          type: string
        temperature:
          default: 0.7
          maximum: 2.0
          minimum: 0.0
          title: Temperature
          type: number
      required:
      - prompt
      title: DocGenerateRequest
      type: object
    DocGenerateResponse:
      properties:
        document:
          title: Document
          type: string
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
        usage:
          anyOf:
          - additionalProperties:
              type: integer
            type: object
          - type: 'null'
          title: Usage
      required:
      - document
      title: DocGenerateResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
    WorkflowCreate:
      properties:
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        name:
          maxLength: 128
          minLength: 1
          title: Name
          type: string
        steps:
          items:
            $ref: '#/components/schemas/WorkflowStep'
          minItems: 1
          title: Steps
          type: array
        type:
          $ref: '#/components/schemas/WorkflowType'
      required:
      - name
      - type
      - steps
      title: WorkflowCreate
      type: object
    WorkflowRead:
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        id:
          format: uuid
          title: Id
          type: string
        metadata:
          additionalProperties: true
          title: Metadata
          type: object
        name:
          title: Name
          type: string
        status:
          $ref: '#/components/schemas/WorkflowStatus'
        steps:
          items:
            $ref: '#/components/schemas/WorkflowStep'
          title: Steps
          type: array
        type:
          $ref: '#/components/schemas/WorkflowType'
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - name
      - type
      - status
      - steps
      - metadata
      - created_at
      - updated_at
      title: WorkflowRead
      type: object
    WorkflowRunRequest:
      properties:
        input:
          additionalProperties: true
          description: Runtime input merged into each step payload
          title: Input
          type: object
      title: WorkflowRunRequest
      type: object
    WorkflowRunResult:
      properties:
        duration_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Duration Ms
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
        outputs:
          description: Ordered list of per-step response payloads
          items:
            additionalProperties: true
            type: object
          title: Outputs
          type: array
        status:
          $ref: '#/components/schemas/WorkflowStatus'
        workflow_id:
          format: uuid
          title: Workflow Id
          type: string
      required:
      - workflow_id
      - status
      title: WorkflowRunResult
      type: object
    WorkflowStatus:
      enum:
      - PENDING
      - RUNNING
      - COMPLETED
      - FAILED
      title: WorkflowStatus
      type: string
    WorkflowStep:
      properties:
        endpoint:
          description: Relative endpoint path on target service
          title: Endpoint
          type: string
        name:
          description: Human-readable step label
          title: Name
          type: string
        payload:
          additionalProperties: true
          description: Static payload merged with runtime context before dispatch
          title: Payload
          type: object
        service:
          description: Target micro-service (akuai | daas | akudemy)
          title: Service
          type: string
      required:
      - name
      - service
      - endpoint
      title: WorkflowStep
      type: object
    WorkflowType:
      enum:
      - DATA_QUERY
      - DOC_GENERATION
      - CONTENT_SEARCH
      - TUTORING_ASSIST
      title: WorkflowType
      type: string
info:
  description: "AI-native productivity layer \u2014 orchestrates AkuAI, Aku-DaaS,\
    \ and Akudemy into multi-step AI workflows."
  title: AkuWorkspace
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/context/{user_id}:
    get:
      description: 'Fetch all key/value context entries stored for *user_id*.


        Returns an empty ``data`` dict when no context has been saved yet.'
      operationId: get_context_api_v1_context__user_id__get
      parameters:
      - in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Retrieve contextual memory for a user
      tags:
      - Context
    post:
      description: Upserts one or more key/value pairs into the user's Redis context
        hash. Existing keys are overwritten; unmentioned keys are preserved.
      operationId: update_context_api_v1_context__user_id__post
      parameters:
      - in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextUpdate'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Save or update context entries for a user
      tags:
      - Context
  /api/v1/docs/generate:
    post:
      description: Forwards the prompt (and optional context) to AkuAI ``POST /api/v1/text/generate``
        and returns the generated document text along with model metadata.
      operationId: generate_document_api_v1_docs_generate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocGenerateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocGenerateResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: AI-assisted document generation
      tags:
      - Document Generation
  /api/v1/workflows:
    post:
      description: "Persist a workflow definition.\n\nThe workflow is not executed\
        \ here \u2014 call ``POST /{id}/run`` to trigger\nexecution."
      operationId: create_workflow_api_v1_workflows_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create a new AI workflow
      tags:
      - Workflows
  /api/v1/workflows/{workflow_id}:
    get:
      operationId: get_workflow_api_v1_workflows__workflow_id__get
      parameters:
      - in: path
        name: workflow_id
        required: true
        schema:
          format: uuid
          title: Workflow Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRead'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Retrieve a workflow by ID
      tags:
      - Workflows
  /api/v1/workflows/{workflow_id}/run:
    post:
      description: Orchestrates sequential calls to AkuAI, Aku-DaaS, and/or Akudemy
        according to the workflow's step definitions. Each step's response is merged
        into the context passed to the next step.
      operationId: run_workflow_api_v1_workflows__workflow_id__run_post
      parameters:
      - in: path
        name: workflow_id
        required: true
        schema:
          format: uuid
          title: Workflow Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowRunRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRunResult'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Execute an existing workflow
      tags:
      - Workflows
  /health:
    get:
      operationId: health_health_get
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                title: Response Health Health Get
                type: object
          description: Successful Response
      summary: Health
      tags:
      - Health
